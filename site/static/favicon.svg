<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="UmaStudies">
  <!-- Closed book, gently tilted, with fake depth via a darker extruded side
       layer behind the cover. The horseshoe is knocked out of the front cover
       (evenodd) so it reveals the darker layer, reading as a recessed shape.
       This file is the browser-tab favicon; the header logo mark uses the flat
       logo-mark.svg so it can be tinted to the page accent. -->
  <g transform="rotate(-7 16 16)">
    <!-- Extruded side/back: offset down-right to give the cover thickness. -->
    <path fill="#3d6b4d" d="M12.3 7.3 H22.3 A2.5 2.5 0 0 1 24.8 9.8 V24.8 A2.5 2.5 0 0 1 22.3 27.3 H12.3 A2.5 2.5 0 0 1 9.8 24.8 V9.8 A2.5 2.5 0 0 1 12.3 7.3 Z"/>
    <!-- Front cover with the horseshoe knocked out to reveal the side layer. -->
    <path fill-rule="evenodd" fill="#5B8C6A" d="M10.5 5.5 H20.5 A2.5 2.5 0 0 1 23 8 V23 A2.5 2.5 0 0 1 20.5 25.5 H10.5 A2.5 2.5 0 0 1 8 23 V8 A2.5 2.5 0 0 1 10.5 5.5 Z M10.5 14.5 A5 5 0 0 1 20.5 14.5 L20.5 21.5 L18 21.5 L18 14.5 A2.5 2.5 0 0 0 13 14.5 L13 21.5 L10.5 21.5 Z"/>
  </g>
</svg>
